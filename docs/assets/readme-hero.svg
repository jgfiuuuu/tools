<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="92" r="140" fill="#1E293B" fill-opacity="0.55"/>
  <circle cx="104" cy="548" r="180" fill="#0B1220" fill-opacity="0.8"/>

  <text x="72" y="112" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">DeepResearch</text>
  <text x="72" y="154" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="23">
    Local AI research system for agentic web research and scholarly literature workbench
  </text>

  <rect x="72" y="212" width="324" height="132" rx="20" fill="url(#cardA)"/>
  <text x="102" y="258" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">General Research Agent</text>
  <text x="102" y="297" fill="#E6FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18">Plan tasks, search the web, summarize sources,</text>
  <text x="102" y="323" fill="#E6FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18">stream progress, and write a final report.</text>

  <rect x="430" y="212" width="324" height="132" rx="20" fill="url(#cardB)"/>
  <text x="460" y="258" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Scholarly Workbench</text>
  <text x="460" y="297" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Create sessions, recall papers, rerank candidates,</text>
  <text x="460" y="323" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">upload PDFs, and generate research memos.</text>

  <rect x="788" y="212" width="340" height="132" rx="20" fill="url(#cardC)"/>
  <text x="818" y="258" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Local-first Outputs</text>
  <text x="818" y="297" fill="#F5F3FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">SQLite sessions, notes, reports, memo sections,</text>
  <text x="818" y="323" fill="#F5F3FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">paper cards, Markdown export, and BibTeX.</text>

  <rect x="72" y="392" width="1056" height="162" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="106" y="438" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Core idea</text>
  <text x="106" y="478" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">
    Do not stop at “one answer from one prompt”.
  </text>
  <text x="106" y="510" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="21">
    Turn research into a reusable workflow with planning, evidence gathering, selection, persistence, and reporting.
  </text>

  <rect x="886" y="432" width="198" height="54" rx="14" fill="#0F172A" stroke="#14B8A6" stroke-width="2"/>
  <text x="918" y="466" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">FastAPI + Vue</text>
</svg>
